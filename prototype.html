<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Clock & Timer</title>
<style>
:root {
  --bg: #0f1115;
  --surface: #171a21;
  --text: #f5f7ff;
  --muted: #9ea6b8;
  --accent: #67a4ff;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100svh;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at top, #1a2030, var(--bg));
  color: var(--text);
  font-family: "Inter", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
main {
  width: min(520px, 92vw);
  display: grid;
  gap: 20px;
}
.panel {
  background: color-mix(in srgb, var(--surface) 88%, black);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 24px;
}
.clock {
  font-size: clamp(2rem, 8vw, 3.2rem);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
  text-align: center;
}
.timer-display {
  font-size: clamp(2.2rem, 10vw, 3.8rem);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  text-align: center;
  margin-bottom: 18px;
}
.controls {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
button {
  border: 0;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 1rem;
  font-weight: 600;
  color: #081226;
  background: var(--accent);
  cursor: pointer;
}
button.secondary {
  background: #2b3242;
  color: var(--text);
}
</style>
</head>
<body>
<main>
  <section class="panel">
    <div id="clock" class="clock" aria-live="polite"></div>
  </section>

  <section class="panel">
    <div id="timer" class="timer-display" aria-live="polite">00:00</div>
    <div class="controls">
      <button id="start" type="button">시작</button>
      <button id="reset" type="button" class="secondary">초기화</button>
    </div>
  </section>
</main>

<script>
const clockElement = document.getElementById("clock");
const timerElement = document.getElementById("timer");
const startButton = document.getElementById("start");
const resetButton = document.getElementById("reset");

let elapsedSeconds = 0;
let timerId = null;

const formatTime = (totalSeconds) => {
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
};

const updateClock = () => {
  const now = new Date();
  clockElement.textContent = now.toLocaleTimeString("ko-KR", { hour12: false });
};

const updateTimer = () => {
  timerElement.textContent = formatTime(elapsedSeconds);
};

startButton.addEventListener("click", () => {
  if (timerId !== null) return;
  timerId = window.setInterval(() => {
    elapsedSeconds += 1;
    updateTimer();
  }, 1000);
});

resetButton.addEventListener("click", () => {
  if (timerId !== null) {
    window.clearInterval(timerId);
    timerId = null;
  }
  elapsedSeconds = 0;
  updateTimer();
});

updateClock();
updateTimer();
window.setInterval(updateClock, 1000);
</script>
</body>
</html>
